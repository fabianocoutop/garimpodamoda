<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Garimpo da Moda | Brechó Exclusivo</title>
    <!-- Fontes do Google -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet">
    <!-- Estilo Principal -->
    <link rel="stylesheet" href="style.css">
    <!-- SDK Supabase -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="app.js?v=4" defer></script>
</head>
<body>

    <!-- Cabeçalho -->
    <header class="main-header">
        <div class="logo-container">
            <img src="img/logo.jpg" alt="Logo Garimpo da Moda" class="logo">
        </div>
        <p class="subtitle">Peças únicas. Curadoria exclusiva.</p>
    </header>

    <!-- Vitrine de Produtos -->
    <main class="container">
        <section id="vitrine" class="product-grid">
            <!-- Os produtos serão injetados aqui via app.js -->
            <div class="loading">Carregando as peças incríveis de hoje...</div>
        </section>
    </main>

    <!-- Rodapé -->
    <footer class="main-footer">
        <p>&copy; 2026 Garimpo da Moda. Todos os direitos reservados.</p>
        <p>Enviamos para todo o Brasil ❤️</p>
    </footer>

    <!-- Overlay e Modal de Checkout (Oculto por padrão) -->
    <div id="checkout-overlay" class="overlay" style="display: none;">
        <div class="modal">
            <button class="close-btn" onclick="fecharCheckout()">&times;</button>
            
            <div class="modal-header">
                <h2>Quase lá! ✨</h2>
                <p>Preencha os dados abaixo para garantir a sua peça (lembre-se, ela é única!). Após o pagamento, ela sairá da vitrine.</p>
            </div>
            
            <!-- Resumo do Produto Selecionado -->
            <div class="product-summary" id="product-summary">
                <!-- Informações Injetadas pelo app.js -->
            </div>

            <!-- Formulário -->
            <form id="checkout-form" onsubmit="processarPedido(event)">
                <input type="hidden" id="produto-id-selecionado">
                <input type="hidden" id="produto-titulo-selecionado">
                <input type="hidden" id="produto-preco-selecionado">
                
                <div class="input-group">
                    <label for="nome">Como devemos te chamar?</label>
                    <input type="text" id="nome" placeholder="Seu nome completo" required>
                </div>

                <div class="input-group">
                    <label for="instagram">Seu Instagram (para acompanhamento):</label>
                    <input type="text" id="instagram" placeholder="@seu.usuario" required>
                </div>

                <div class="input-group">
                    <label for="email">E-mail (Para enviar o recibo):</label>
                    <input type="email" id="email" placeholder="seuemail@exemplo.com" required>
                </div>

                <div class="input-group dual-column">
                    <div style="flex:1;">
                        <label for="cpf">CPF (Obrigatório para Nota e Entrega):</label>
                        <input type="text" id="cpf" placeholder="000.000.000-00" maxlength="14" oninput="maskCpf(this)" required>
                    </div>
                    <div style="flex:1;">
                        <label for="telefone">WhatsApp / Celular:</label>
                        <input type="text" id="telefone" placeholder="(11) 99999-9999" maxlength="15" oninput="maskPhone(this)" required>
                    </div>
                </div>

                <div class="input-group">
                    <label>Endereço de Entrega</label>
                    <div class="endereco-grid">
                        <input type="text" id="cep" placeholder="CEP" maxlength="9" oninput="maskCep(this)" onblur="buscarCep(this.value)" required style="width: 100%; margin-bottom: 8px;">
                        <div style="display: flex; gap: 8px; margin-bottom: 8px;">
                            <input type="text" id="rua" placeholder="Rua / Avenida" required style="flex: 3;">
                            <input type="text" id="numero" placeholder="Número" required style="flex: 1;">
                        </div>
                        <div style="display: flex; gap: 8px;">
                            <input type="text" id="bairro" placeholder="Bairro" required style="flex: 2;">
                            <input type="text" id="cidade" placeholder="Cidade" required style="flex: 2;">
                            <input type="text" id="estado" placeholder="UF" maxlength="2" required style="flex: 1; text-transform: uppercase;">
                        </div>
                    </div>
                </div>

                <button type="submit" class="btn-primary" id="btn-finalizar">
                    Ir para Pagamento (Cartão ou PIX)
                </button>
                <div id="checkout-error" class="error-msg"></div>
            </form>
        </div>
    </div>

    <!-- Script Principal (Cache-busted) -->
    <script src="app.js?v=3"></script>

</body>
</html>
