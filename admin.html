<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' https://cdn.jsdelivr.net; style-src 'self' https://fonts.googleapis.com 'unsafe-inline'; font-src https://fonts.gstatic.com; img-src 'self' https://*.supabase.co https://via.placeholder.com blob: data:; connect-src https://*.supabase.co;">
    <title>Garimpo da Moda | Painel Administrativo</title>
    <link rel="icon" href="img/logo.jpg" type="image/jpeg">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2" defer></script>
    <style>
        :root {
            --bg: #0f0f13;
            --surface: #1a1a24;
            --surface2: #23232f;
            --border: #2e2e40;
            --accent: #c084fc;
            --accent2: #f472b6;
            --text: #f1f0f7;
            --text-muted: #9090a8;
            --success: #34d399;
            --danger: #f87171;
            --warning: #fbbf24;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Outfit', sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
        }

        /* ===== LOGIN ===== */
        #login-screen {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            background: radial-gradient(ellipse at top, #1a0a2e 0%, #0f0f13 60%);
        }

        .login-box {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 48px 40px;
            width: 100%;
            max-width: 420px;
            text-align: center;
            box-shadow: 0 0 60px rgba(192, 132, 252, 0.08);
        }

        .login-logo {
            margin-bottom: 12px;
        }

        .login-logo img {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            object-fit: cover;
        }

        .login-box h1 {
            font-size: 1.4rem;
            font-weight: 600;
            margin-bottom: 4px;
        }

        .login-box p {
            color: var(--text-muted);
            font-size: 0.9rem;
            margin-bottom: 32px;
        }

        .login-box input {
            width: 100%;
            padding: 14px 16px;
            background: var(--surface2);
            border: 1px solid var(--border);
            border-radius: 10px;
            color: var(--text);
            font-family: 'Outfit', sans-serif;
            font-size: 1rem;
            margin-bottom: 12px;
            transition: border-color 0.2s;
        }

        .login-box input:focus {
            outline: none;
            border-color: var(--accent);
        }

        .btn-login {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, var(--accent), var(--accent2));
            border: none;
            border-radius: 10px;
            color: white;
            font-family: 'Outfit', sans-serif;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            margin-top: 8px;
            transition: opacity 0.2s, transform 0.1s;
        }

        .btn-login:hover { opacity: 0.9; transform: translateY(-1px); }
        .btn-login:active { transform: translateY(0); }

        .login-error {
            background: rgba(248, 113, 113, 0.1);
            border: 1px solid rgba(248, 113, 113, 0.3);
            color: var(--danger);
            padding: 12px;
            border-radius: 8px;
            font-size: 0.88rem;
            margin-top: 12px;
            display: none;
        }

        /* ===== ADMIN PANEL ===== */
        #admin-panel { display: none; }

        .admin-header {
            background: var(--surface);
            border-bottom: 1px solid var(--border);
            padding: 16px 32px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .admin-header .brand {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .admin-header .brand-icon {
            width: 36px;
            height: 36px;
            background: linear-gradient(135deg, var(--accent), var(--accent2));
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.1rem;
        }

        .admin-header h1 { font-size: 1.1rem; font-weight: 600; }
        .admin-header p { font-size: 0.8rem; color: var(--text-muted); }

        .btn-logout {
            background: var(--surface2);
            border: 1px solid var(--border);
            color: var(--text-muted);
            padding: 8px 18px;
            border-radius: 8px;
            cursor: pointer;
            font-family: 'Outfit', sans-serif;
            font-size: 0.88rem;
            transition: all 0.2s;
        }

        .btn-logout:hover { color: var(--danger); border-color: var(--danger); }

        .admin-content {
            max-width: 1100px;
            margin: 0 auto;
            padding: 32px 24px;
            display: grid;
            grid-template-columns: 400px 1fr;
            gap: 28px;
            align-items: start;
        }

        @media (max-width: 800px) {
            .admin-content { grid-template-columns: 1fr; }
        }

        /* ===== FORM CARD ===== */
        .card-admin {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 28px;
        }

        .card-admin h2 {
            font-size: 1.1rem;
            font-weight: 600;
            margin-bottom: 24px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .form-group {
            margin-bottom: 16px;
        }

        .form-group label {
            display: block;
            font-size: 0.85rem;
            font-weight: 500;
            color: var(--text-muted);
            margin-bottom: 6px;
        }

        .form-group input,
        .form-group textarea,
        .form-group select {
            width: 100%;
            padding: 12px 14px;
            background: var(--surface2);
            border: 1px solid var(--border);
            border-radius: 10px;
            color: var(--text);
            font-family: 'Outfit', sans-serif;
            font-size: 0.95rem;
            transition: border-color 0.2s;
        }

        .form-group input:focus,
        .form-group textarea:focus,
        .form-group select:focus {
            outline: none;
            border-color: var(--accent);
        }

        .form-group select option { background: var(--surface2); }

        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
        }

        /* Upload de imagem */
        .upload-area {
            border: 2px dashed var(--border);
            border-radius: 12px;
            padding: 24px;
            text-align: center;
            cursor: pointer;
            transition: all 0.2s;
            position: relative;
        }

        .upload-area:hover {
            border-color: var(--accent);
            background: rgba(192, 132, 252, 0.04);
        }

        .upload-area.has-image {
            border-style: solid;
            border-color: var(--accent);
            padding: 0;
            overflow: hidden;
        }

        .upload-area img.preview {
            width: 100%;
            height: 200px;
            object-fit: cover;
            border-radius: 10px;
            display: block;
        }

        .upload-area input[type="file"] {
            position: absolute;
            inset: 0;
            opacity: 0;
            cursor: pointer;
            width: 100%;
            height: 100%;
            z-index: 10;
        }

        .upload-icon { font-size: 2rem; margin-bottom: 8px; }
        .upload-area p { color: var(--text-muted); font-size: 0.85rem; }
        .upload-area strong { color: var(--accent); }

        .upload-overlay {
            position: absolute;
            inset: 0;
            background: rgba(0,0,0,0.5);
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 10px;
            opacity: 0;
            transition: opacity 0.2s;
            pointer-events: none;
            z-index: 5;
        }

        .upload-area.has-image:hover .upload-overlay { opacity: 1; }

        .btn-publish {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, var(--accent), var(--accent2));
            border: none;
            border-radius: 10px;
            color: white;
            font-family: 'Outfit', sans-serif;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            margin-top: 8px;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .btn-publish:hover { opacity: 0.9; transform: translateY(-1px); }
        .btn-publish:disabled { opacity: 0.5; transform: none; cursor: not-allowed; }

        .form-feedback {
            padding: 12px 16px;
            border-radius: 8px;
            font-size: 0.88rem;
            margin-top: 12px;
            display: none;
        }

        .form-feedback.success {
            background: rgba(52, 211, 153, 0.1);
            border: 1px solid rgba(52, 211, 153, 0.3);
            color: var(--success);
        }

        .form-feedback.error {
            background: rgba(248, 113, 113, 0.1);
            border: 1px solid rgba(248, 113, 113, 0.3);
            color: var(--danger);
        }

        /* ===== PRODUCT LIST ===== */
        .products-list-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 20px;
        }

        .products-list-header h2 {
            font-size: 1.1rem;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .badge {
            background: var(--surface2);
            color: var(--text-muted);
            padding: 3px 10px;
            border-radius: 20px;
            font-size: 0.8rem;
        }

        .product-admin-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 14px;
            padding: 16px;
            display: flex;
            gap: 16px;
            align-items: center;
            margin-bottom: 12px;
            transition: border-color 0.2s;
        }

        .product-admin-card:hover { border-color: var(--border); }

        .product-admin-card.unavailable { opacity: 0.5; }

        .product-admin-img {
            width: 80px;
            height: 80px;
            border-radius: 10px;
            object-fit: cover;
            background: var(--surface2);
            flex-shrink: 0;
        }

        .product-admin-info { flex: 1; min-width: 0; }

        .product-admin-info h3 {
            font-size: 0.95rem;
            font-weight: 600;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .product-admin-info p {
            font-size: 0.82rem;
            color: var(--text-muted);
            margin-top: 2px;
        }

        .product-admin-price {
            font-size: 1rem;
            font-weight: 700;
            color: var(--accent);
            margin-top: 4px;
        }

        .product-badges {
            display: flex;
            gap: 6px;
            margin-top: 6px;
        }

        .badge-tamanho {
            background: rgba(192, 132, 252, 0.15);
            color: var(--accent);
            padding: 2px 8px;
            border-radius: 6px;
            font-size: 0.75rem;
            font-weight: 600;
        }

        .badge-status-ok {
            background: rgba(52, 211, 153, 0.15);
            color: var(--success);
            padding: 2px 8px;
            border-radius: 6px;
            font-size: 0.75rem;
        }

        .badge-status-sold {
            background: rgba(248, 113, 113, 0.15);
            color: var(--danger);
            padding: 2px 8px;
            border-radius: 6px;
            font-size: 0.75rem;
        }

        .product-actions {
            display: flex;
            flex-direction: column;
            gap: 6px;
            flex-shrink: 0;
        }

        .btn-action {
            padding: 6px 14px;
            border-radius: 8px;
            border: 1px solid var(--border);
            background: var(--surface2);
            color: var(--text-muted);
            cursor: pointer;
            font-family: 'Outfit', sans-serif;
            font-size: 0.8rem;
            transition: all 0.2s;
            white-space: nowrap;
        }

        .btn-action:hover { background: var(--surface); color: var(--text); }

        .btn-action.reativar:hover { color: var(--success); border-color: var(--success); }
        .btn-action.desativar:hover { color: var(--warning); border-color: var(--warning); }
        .btn-action.deletar:hover { color: var(--danger); border-color: var(--danger); }

        .empty-state {
            text-align: center;
            padding: 48px 24px;
            color: var(--text-muted);
        }

        .empty-state p { font-size: 2rem; margin-bottom: 12px; }

        .loading-admin {
            text-align: center;
            padding: 32px;
            color: var(--text-muted);
            font-size: 0.9rem;
        }

        /* Spinner */
        @keyframes spin { to { transform: rotate(360deg); } }
        .spinner {
            width: 20px;
            height: 20px;
            border: 2px solid rgba(255,255,255,0.3);
            border-top-color: white;
            border-radius: 50%;
            animation: spin 0.7s linear infinite;
        }
    </style>
</head>
<body>

<!-- ========== TELA DE LOGIN ========== -->
<div id="login-screen">
    <div class="login-box">
        <div class="login-logo"><img src="img/logo.jpg" alt="Garimpo da Moda"></div>
        <h1>Painel da Loja</h1>
        <p>Garimpo da Moda — Acesso Restrito</p>

        <input type="email" id="admin-email" placeholder="Seu e-mail" autocomplete="email">
        <input type="password" id="admin-password" placeholder="Senha" autocomplete="current-password">
        <button class="btn-login" onclick="fazerLogin()" aria-label="Entrar no painel administrativo">Entrar no Painel</button>

        <div class="login-error" id="login-error"></div>
    </div>
</div>

<!-- ========== PAINEL ADMIN ========== -->
<div id="admin-panel">

    <header class="admin-header">
        <div class="brand">
            <div class="brand-icon"><img src="img/logo.jpg" alt="Logo" style="width:32px;height:32px;border-radius:50%;object-fit:cover;"></div>
            <div>
                <h1>Garimpo da Moda</h1>
                <p id="admin-user-email">Carregando...</p>
            </div>
        </div>
        <button class="btn-logout" onclick="fazerLogout()" aria-label="Sair do painel">Sair</button>
    </header>

    <div class="admin-content">

        <!-- FORMULÁRIO NOVA PEÇA -->
        <div class="card-admin" style="position: sticky; top: 80px;">
            <h2>✨ Adicionar Nova Peça</h2>

            <div class="form-group">
                <label>Foto da Peça</label>
                <div class="upload-area" id="upload-area">
                    <input type="file" id="foto-input" accept="image/*" onchange="previewFoto(this)">
                    <div class="upload-overlay">
                        <span style="color:white; font-size:0.85rem;">Trocar foto</span>
                    </div>
                    <div id="upload-placeholder">
                        <div class="upload-icon">📷</div>
                        <p><strong>Clique para escolher a foto</strong></p>
                        <p>JPG, PNG ou WebP (máx. 5MB)</p>
                    </div>
                    <img id="foto-preview" class="preview" src="" alt="Pré-visualização da foto selecionada" style="display:none;">
                </div>
            </div>

            <div class="form-group">
                <label>Título da Peça *</label>
                <input type="text" id="novo-titulo" placeholder="Ex: Blazer Vintage Anos 80">
            </div>

            <div class="form-group">
                <label>Descrição</label>
                <textarea id="nova-descricao" rows="2" placeholder="Detalhes da peça, material, estado..."></textarea>
            </div>

            <div class="form-row">
                <div class="form-group">
                    <label>Preço (R$) *</label>
                    <input type="number" id="novo-preco" placeholder="89.90" step="0.01" min="0">
                </div>
                <div class="form-group">
                    <label>Tamanho</label>
                    <select id="novo-tamanho">
                        <option value="PP">PP</option>
                        <option value="P">P</option>
                        <option value="M" selected>M</option>
                        <option value="G">G</option>
                        <option value="GG">GG</option>
                        <option value="XGG">XGG</option>
                        <option value="U">Único</option>
                    </select>
                </div>
            </div>

            <button class="btn-publish" id="btn-publicar" onclick="publicarProduto()" aria-label="Publicar peça na vitrine">
                <span>🚀</span> Publicar na Vitrine
            </button>

            <div class="form-feedback" id="form-feedback"></div>
        </div>

        <!-- LISTA DE PRODUTOS -->
        <div>
            <div class="products-list-header">
                <h2>📦 Vitrine Atual <span class="badge" id="total-badge">—</span></h2>
                <button class="btn-action" onclick="carregarProdutos()" style="font-size:0.85rem;">🔄 Atualizar</button>
            </div>
            <div id="lista-produtos">
                <div class="loading-admin">Carregando produtos...</div>
            </div>
        </div>

    </div>
</div>

<script src="admin.js?v=2" defer></script>
</body>
</html>
